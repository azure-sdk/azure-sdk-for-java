# Regenerates all TypeSpec-based SDKs in azure-sdk-for-java using the typespec-java emitter,
# then opens an automated draft PR with the results.
#
# The typespec-java emitter lives in Azure/typespec-azure (packages/typespec-java).
# By default (DevPackage=false) this pipeline generates using the published
# @azure-tools/typespec-java npm package. Set DevPackage=true to instead build the emitter
# dev package from source: from the typespec-azure PR given by PRId, or from the default
# branch (main) when PRId is left at 'none'.
trigger: none
pr: none

parameters:
# NOTE: Azure DevOps cannot conditionally show/hide runtime parameters, so both are always
# shown. DevPackage defaults to false (a boolean toggle needs no value entered). PRId is only
# used when DevPackage=true; leave it at 'none' to build the emitter from main.
- name: DevPackage
  displayName: 'DevPackage'
  type: boolean
  default: false
- name: PRId
  displayName: 'typespec-azure PR ID (e.g. 43321; used only when DevPackage=true, none = main)'
  type: string
  default: 'none'

jobs:
- job: Generate_SDK

  timeoutInMinutes: 120

  variables:
  - template: /eng/pipelines/templates/variables/globals.yml
  - template: /eng/pipelines/templates/variables/image.yml
  - name: NodeVersion
    value: '24.x'
  # Local clone target for the (public) Azure/typespec-azure emitter repo.
  - name: TypeSpecAzureDirectory
    value: $(Agent.BuildDirectory)/typespec-azure
  - name: PullRequestTitleSuffix
    ${{ if eq(parameters.DevPackage, true) }}:
      ${{ if ne(parameters.PRId, 'none') }}:
        value: " DEV (typespec-azure PR ${{ parameters.PRId }})"
      ${{ else }}:
        value: " DEV (typespec-azure main)"
    ${{ else }}:
      value: ""

  pool:
    name: $(LINUXPOOL)
    image: $(LINUXVMIMAGE)
    os: linux

  steps:
  # azure-sdk-for-java (self) is the only repo resource, so it is checked out to
  # $(Build.SourcesDirectory). Azure/typespec-azure is public, so it is cloned directly
  # (below) instead of via a repository resource + GitHub service connection.
  - checkout: self

  - task: NodeTool@0
    displayName: 'Install Node.js $(NodeVersion)'
    inputs:
      versionSpec: '$(NodeVersion)'

  - template: /eng/pipelines/templates/steps/maven-authenticate.yml
    parameters:
      SourceDirectory: $(Build.SourcesDirectory)

  - template: /eng/common/pipelines/templates/steps/create-authenticated-npmrc.yml
    parameters:
      registryUrl: https://pkgs.dev.azure.com/azure-sdk/public/_packaging/azure-sdk-for-js/npm/registry/

  # Clone the public Azure/typespec-azure repo (no service connection required). When building
  # a dev package (DevPackage=true) with a PRId specified, fetch and check out that PR ref
  # (a bare number is expanded to refs/pull/<id>/merge; a full ref is used as-is). When PRId is
  # left at 'none', the emitter is built from the default branch (main). Submodules are then
  # initialized because typespec-azure vendors the TypeSpec compiler and the http-client-java
  # generator via the 'core' submodule, which build:generator (Build-Generator.ps1) and tspd
  # both require.
  - task: PowerShell@2
    displayName: 'Clone typespec-azure'
    inputs:
      pwsh: true
      targetType: 'inline'
      script: |
        git clone https://github.com/Azure/typespec-azure.git "$(TypeSpecAzureDirectory)"
        $devPackage = [System.Convert]::ToBoolean('${{ parameters.DevPackage }}')
        $prId = '${{ parameters.PRId }}'
        if ($devPackage) {
          if ($prId -and $prId -ne 'none') {
            if ($prId -match '^\d+$') {
              $ref = "refs/pull/$prId/merge"
            } else {
              $ref = $prId
            }
            Write-Host "Fetching typespec-azure ref $ref"
            git -C "$(TypeSpecAzureDirectory)" fetch origin $ref
            git -C "$(TypeSpecAzureDirectory)" checkout FETCH_HEAD
          }
          # The 'core' submodule (microsoft/typespec) provides tspd and the http-client-java
          # generator, both required by the dev build; init it only when actually building.
          git -C "$(TypeSpecAzureDirectory)" submodule update --init --recursive
        }

  # Build the emitter dev package (.tgz) from the typespec-azure PR.
  # typespec-java depends on other workspace packages (workspace:^). First build only those
  # upstream dependencies with turbo (the `^...` filter selects dependencies but excludes
  # typespec-java itself). Then Build-TypeSpec.ps1 builds and packs typespec-java (its
  # build:generator step runs Build-Generator.ps1, which needs JDK 11+ and Maven), producing
  # the .tgz next to the package.json for sync_sdk.py to pick up.
  - task: PowerShell@2
    retryCountOnTaskFailure: 1
    condition: and(succeeded(), eq('${{ parameters.DevPackage }}', 'true'))
    displayName: 'Build typespec-java dev package'
    inputs:
      pwsh: true
      targetType: 'inline'
      script: |
        corepack enable
        pnpm install
        pnpm turbo run build --filter "@azure-tools/typespec-java^..."
        ./packages/typespec-java/Build-TypeSpec.ps1
      workingDirectory: $(TypeSpecAzureDirectory)

  - script: |
      npm install -g @azure-tools/typespec-client-generator-cli
    displayName: 'Install tsp-client'

  - task: PowerShell@2
    displayName: 'Get Package Version'
    inputs:
      pwsh: true
      targetType: 'inline'
      script: |
        $PACKAGE_VERSION = node -p -e "require('./packages/typespec-java/package.json').version"
        Write-Host("##vso[task.setvariable variable=PackageVersion]$PACKAGE_VERSION")
      workingDirectory: $(TypeSpecAzureDirectory)

  - script: |
      python3 ./eng/pipelines/scripts/sync_sdk.py --sdk-root=$(Build.SourcesDirectory) --package-json-path=$(TypeSpecAzureDirectory)/packages/typespec-java/package.json --dev-package=${{ parameters.DevPackage }}
    displayName: 'Generate SDK'
    workingDirectory: $(Build.SourcesDirectory)

  - template: /eng/common/pipelines/templates/steps/create-pull-request.yml
    parameters:
      WorkingDirectory: $(Build.SourcesDirectory)
      ScriptDirectory: $(Build.SourcesDirectory)/eng/common/scripts
      RepoName: azure-sdk-for-java
      BaseBranchName: 'refs/heads/main'
      PRBranchName: typespec-java-generation-$(Build.BuildId)
      CommitMsg: '[Automation] Generate SDK based on TypeSpec $(PackageVersion)$(PullRequestTitleSuffix)'
      PRTitle: '[Automation] Generate SDK based on TypeSpec $(PackageVersion)$(PullRequestTitleSuffix)'
      PRLabels: 'DPG'
      OpenAsDraft: 'true'
